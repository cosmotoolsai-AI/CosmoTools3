<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CosmoTools • AI Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <style>
    .message { max-width: 80%; padding: 14px 20px; border-radius: 20px; }
    .user-message { background: rgb(124 58 237); margin-left: auto; }
    .ai-message { background: rgb(39 39 42); margin-right: auto; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="flex h-screen" id="app">

    <!-- Sidebar -->
    <div id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800"></div>

    <!-- Main -->
    <div class="flex-1 flex flex-col">
      <header class="h-14 border-b border-zinc-800 bg-zinc-900 px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl">🪐</span>
          <h1 class="text-xl font-bold">CosmoTools</h1>
        </div>
        <button onclick="showPricing()" class="px-5 py-2 bg-violet-600 hover:bg-violet-500 rounded-xl">Upgrade</button>
      </header>

      <div class="flex-1 flex overflow-hidden">
        <div class="flex-1 flex flex-col p-6" id="chat-area">
          <div id="welcome" class="flex-1 flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold mb-4">What do you want to accomplish today?</h2>
          </div>
          <div id="chat-window" class="flex-1 overflow-y-auto space-y-6 hidden"></div>

          <div class="mt-4">
            <div class="relative max-w-3xl mx-auto">
              <input id="user-input" type="text" 
                     class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg focus:outline-none focus:border-violet-500"
                     placeholder="Ask CosmoAI anything...">
              <button onclick="sendMessage()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-violet-600 w-10 h-10 rounded-2xl">↑</button>
            </div>
          </div>
        </div>

        <!-- Right Panel -->
        <div class="w-80 bg-zinc-900 border-l border-zinc-800 p-6 overflow-y-auto">
          <h3 class="font-semibold mb-4">Popular Tools</h3>
          <div id="workflows-grid" class="space-y-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Pricing Modal -->
  <div id="pricing-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-lg">
      <h2 class="text-3xl font-bold text-center mb-8">Choose Your Plan</h2>
      
      <div class="space-y-4">
        <a href="https://cosmotools.gumroad.com/l/tfyjnl" target="_blank" class="block p-6 bg-zinc-800 hover:bg-zinc-700 rounded-2xl cursor-pointer">
          <div class="flex justify-between"><span class="font-semibold">Monthly</span><span class="font-bold">$4.99</span></div>
        </a>
        <a href="https://cosmotools.gumroad.com/l/pkawh" target="_blank" class="block p-6 bg-zinc-800 hover:bg-zinc-700 rounded-2xl cursor-pointer relative">
          <div class="flex justify-between"><span class="font-semibold">6 Months</span><span class="font-bold">$12.99</span></div>
          <span class="absolute -top-2 -right-2 bg-yellow-400 text-black text-xs px-3 py-1 rounded-full font-bold">MOST POPULAR</span>
        </a>
        <a href="https://cosmotools.gumroad.com/l/qkgoew" target="_blank" class="block p-6 bg-zinc-800 hover:bg-zinc-700 rounded-2xl cursor-pointer">
          <div class="flex justify-between"><span class="font-semibold">1 Year</span><span class="font-bold">$24.99</span></div>
        </a>
      </div>

      <button onclick="hidePricing()" class="mt-6 w-full py-3 text-zinc-400">Close</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
