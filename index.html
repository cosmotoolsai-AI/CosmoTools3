<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CosmoTools • AI Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .locked { filter: blur(8px); pointer-events: none; }
    .tool-card { transition: all 0.3s; }
    .tool-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Paywall -->
  <div id="paywall" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl p-10 max-w-lg w-full text-center">
      <h1 class="text-4xl font-bold mb-2">🪐 CosmoTools</h1>
      <p class="text-zinc-400 mb-8">Unlock all AI tools</p>

      <div class="space-y-4 mb-10">
        <a href="https://cosmotools.gumroad.com/l/tfyjnl" target="_blank" class="block p-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-left">Monthly — $4.99</a>
        <a href="https://cosmotools.gumroad.com/l/pkawh" target="_blank" class="block p-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-left relative">
          6 Months — $12.99 <span class="absolute top-3 right-4 bg-yellow-400 text-black text-xs px-3 py-1 rounded-full font-bold">POPULAR</span>
        </a>
        <a href="https://cosmotools.gumroad.com/l/qkgoew" target="_blank" class="block p-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-left">Yearly — $24.99</a>
      </div>

      <div>
        <p class="text-sm text-zinc-400 mb-3">Have a password from your Gumroad receipt?</p>
        <input id="password-input" type="password" placeholder="Enter password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-center">
        <button onclick="checkPassword()" class="mt-4 w-full bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl font-semibold">Unlock All Tools</button>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="main-app" class="locked min-h-screen flex">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6">
      <h1 class="text-2xl font-bold mb-8">🪐 CosmoTools</h1>
      
      <div onclick="openGeneralChat()" class="p-4 bg-violet-600 hover:bg-violet-500 rounded-2xl mb-8 cursor-pointer text-center font-medium">
        💬 General AI Chat
      </div>

      <h3 class="text-sm uppercase tracking-widest text-zinc-500 mb-3">AI Tools</h3>
      <div id="sidebar-tools" class="space-y-1"></div>
    </div>

    <!-- Tools Grid -->
    <div class="flex-1 p-8 overflow-y-auto">
      <h2 class="text-3xl font-bold mb-8">AI Tools</h2>
      <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <!-- Tool Chat Modal -->
  <div id="tool-chat-modal" class="hidden fixed inset-0 bg-black/90 z-40 flex items-center justify-center">
    <div class="bg-zinc-900 w-full max-w-4xl h-[90vh] rounded-3xl flex flex-col">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 id="tool-chat-title" class="text-xl font-semibold"></h2>
        <button onclick="closeToolChat()" class="text-3xl">×</button>
      </div>
      <div id="tool-chat-window" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
      <div class="p-6 border-t border-zinc-700">
        <div class="flex gap-3">
          <input id="tool-user-input" type="text" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5" placeholder="Type your request...">
          <button onclick="sendToolMessage()" class="bg-violet-600 px-10 rounded-3xl">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- General Chat Modal -->
  <div id="general-chat-modal" class="hidden fixed inset-0 bg-black/90 z-40 flex items-center justify-center">
    <div class="bg-zinc-900 w-full max-w-4xl h-[90vh] rounded-3xl flex flex-col">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-xl font-semibold">General AI Chat</h2>
        <button onclick="closeGeneralChat()" class="text-3xl">×</button>
      </div>
      <div id="general-chat-window" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
      <div class="p-6 border-t border-zinc-700">
        <div class="flex gap-3">
          <input id="general-user-input" type="text" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5" placeholder="Ask anything...">
          <button onclick="sendGeneralMessage()" class="bg-violet-600 px-10 rounded-3xl">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isUnlocked = false;
    const correctPasswords = ["cosmo-24", "cosmo-25", "cosmo-26"];

    const tools = [
      { title: "Business Proposal", icon: "📝", base: "Write a professional business proposal" },
      { title: "Coding Assistant", icon: "💻", base: "Help me write code" },
      { title: "School Helper", icon: "📚", base: "Help me with school work" },
      { title: "Marketing Strategy", icon: "📢", base: "Create marketing strategy" },
      { title: "Research Assistant", icon: "🔍", base: "Research this topic" },
      { title: "Resume Builder", icon: "📄", base: "Help me build a resume" },
      { title: "Email Writer", icon: "✉️", base: "Write a professional email" }
    ];

    function loadTools() {
      const grid = document.getElementById('tools-grid');
      const sidebar = document.getElementById('sidebar-tools');

      const html = tools.map(t => `
        <div onclick="openToolChat('${t.title}', '${t.base}')" class="tool-card bg-zinc-900 border border-zinc-800 hover:border-violet-500 p-8 rounded-3xl cursor-pointer">
          <div class="text-5xl mb-6">${t.icon}</div>
          <h3 class="text-xl font-semibold">${t.title}</h3>
        </div>
      `).join('');

      grid.innerHTML = html;
      sidebar.innerHTML = tools.map(t => `
        <div onclick="openToolChat('${t.title}', '${t.base}')" class="p-3 hover:bg-zinc-800 rounded-xl cursor-pointer flex items-center gap-3">
          <span>${t.icon}</span><span>${t.title}</span>
        </div>
      `).join('');
    }

    function openToolChat(title, base) {
      if (!isUnlocked) return showPaywall();
      document.getElementById('tool-chat-title').textContent = title;
      document.getElementById('tool-chat-window').innerHTML = '';
      document.getElementById('tool-chat-modal').classList.remove('hidden');
      addToolMessage('ai', `Hello! I'm ready to help with your ${title.toLowerCase()}. What would you like to do?`);
    }

    function sendToolMessage() {
      const input = document.getElementById('tool-user-input');
      const text = input.value.trim();
      if (!text) return;

      addToolMessage('user', text);
      input.value = '';

      const typingId = addToolTyping();

      // Simulate AI response (you can connect to /api/groq later)
      setTimeout(() => {
        removeToolTyping(typingId);
        addToolMessage('ai', "Here's a detailed response based on your request...");
      }, 1200);
    }

    function addToolMessage(role, content) {
      const win = document.getElementById('tool-chat-window');
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
      div.textContent = content;
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
    }

    function addToolTyping() {
      const id = 't-' + Date.now();
      const win = document.getElementById('tool-chat-window');
      const div = document.createElement('div');
      div.id = id;
      div.className = "message ai-message";
      div.textContent = "Thinking...";
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
      return id;
    }

    function removeToolTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function openGeneralChat() {
      if (!isUnlocked) return showPaywall();
      document.getElementById('general-chat-modal').classList.remove('hidden');
    }

    function sendGeneralMessage() {
      // Similar to tool chat - you can connect to groq
      alert("General chat connected to Groq (add your fetch logic here)");
    }

    function closeToolChat() {
      document.getElementById('tool-chat-modal').classList.add('hidden');
    }

    function closeGeneralChat() {
      document.getElementById('general-chat-modal').classList.add('hidden');
    }

    function checkPassword() {
      const input = document.getElementById('password-input').value.trim();
      if (correctPasswords.includes(input)) {
        isUnlocked = true;
        document.getElementById('paywall').classList.add('hidden');
        document.getElementById('main-app').classList.remove('locked');
      } else {
        alert("Incorrect password.");
      }
    }

    function showPaywall() {
      if (!isUnlocked) document.getElementById('paywall').classList.remove('hidden');
    }

    document.addEventListener('DOMContentLoaded', loadTools);
  </script>
</body>
</html>
