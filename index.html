<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CosmoTools • AI Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .locked { filter: blur(8px); pointer-events: none; }
    .tool-card { transition: all 0.3s; }
    .tool-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Paywall -->
  <div id="paywall" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl p-10 max-w-lg w-full text-center">
      <h1 class="text-4xl font-bold mb-2">🪐 CosmoTools</h1>
      <p class="text-zinc-400 mb-8">Unlock all AI tools</p>

      <div class="space-y-4 mb-10">
        <a href="https://cosmotools.gumroad.com/l/tfyjnl" target="_blank" class="block p-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-left">Monthly — $4.99</a>
        <a href="https://cosmotools.gumroad.com/l/pkawh" target="_blank" class="block p-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-left relative">
          6 Months — $12.99 <span class="absolute top-3 right-4 bg-yellow-400 text-black text-xs px-3 py-1 rounded-full font-bold">POPULAR</span>
        </a>
        <a href="https://cosmotools.gumroad.com/l/qkgoew" target="_blank" class="block p-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-left">Yearly — $24.99</a>
      </div>

      <div>
        <p class="text-sm text-zinc-400 mb-3">Have a password from your Gumroad receipt?</p>
        <input id="password-input" type="password" placeholder="Enter password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-center">
        <button onclick="checkPassword()" class="mt-4 w-full bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl font-semibold">Unlock All Tools</button>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="main-app" class="locked min-h-screen flex">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6">
      <h1 class="text-2xl font-bold mb-8 flex items-center gap-2">🪐 CosmoTools</h1>
      
      <div onclick="openChat()" class="p-4 bg-violet-600 hover:bg-violet-500 rounded-2xl mb-8 cursor-pointer text-center font-medium">
        💬 Open AI Chat
      </div>

      <h3 class="text-sm uppercase tracking-widest text-zinc-500 mb-3">AI Tools</h3>
      <div id="sidebar-tools" class="space-y-1"></div>
    </div>

    <!-- Tools Dashboard -->
    <div class="flex-1 p-8 overflow-y-auto">
      <h2 class="text-3xl font-bold mb-8">AI Tools</h2>
      <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <!-- Tool Form Modal -->
  <div id="tool-modal" class="hidden fixed inset-0 bg-black/90 z-40 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full">
      <h2 id="modal-title" class="text-2xl font-bold mb-6"></h2>
      <div id="form-fields" class="space-y-4"></div>
      <div class="flex gap-3 mt-8">
        <button onclick="closeToolModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancel</button>
        <button onclick="submitToolForm()" class="flex-1 py-4 bg-violet-600 rounded-2xl">Generate with AI</button>
      </div>
    </div>
  </div>

  <!-- Chat Modal -->
  <div id="chat-modal" class="hidden fixed inset-0 bg-black/90 z-40 flex items-center justify-center">
    <div class="bg-zinc-900 w-full max-w-4xl h-[90vh] rounded-3xl flex flex-col">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-xl font-semibold">CosmoAI Chat</h2>
        <button onclick="closeChat()" class="text-3xl">×</button>
      </div>
      <div id="chat-window" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
      <div class="p-6 border-t border-zinc-700">
        <div class="flex gap-3">
          <input id="user-input" type="text" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5" placeholder="Type your message...">
          <button onclick="sendMessage()" class="bg-violet-600 px-10 rounded-3xl">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isUnlocked = false;
    const correctPasswords = ["cosmo-24", "cosmo-25", "cosmo-26"];
    let currentTool = null;

    const tools = [
      { title: "Business Proposal", icon: "📝", fields: ["Client Name", "Industry", "Project Details"] },
      { title: "Coding Assistant", icon: "💻", fields: ["Language", "What to build", "Key features"] },
      { title: "School Helper", icon: "📚", fields: ["Subject", "Topic", "Specific Question"] },
      { title: "Marketing Strategy", icon: "📢", fields: ["Product/Service", "Target Audience", "Goals"] },
      { title: "Research Assistant", icon: "🔍", fields: ["Topic", "Time Period", "Focus Areas"] },
      { title: "Resume Builder", icon: "📄", fields: ["Full Name", "Job Title", "Years of Experience", "Key Skills"] },
      { title: "Email Writer", icon: "✉️", fields: ["Recipient", "Purpose", "Tone"] }
    ];

    function loadTools() {
      // Grid
      const grid = document.getElementById('tools-grid');
      grid.innerHTML = tools.map(t => `
        <div onclick="selectTool('${t.title}')" class="tool-card bg-zinc-900 border border-zinc-800 hover:border-violet-500 p-8 rounded-3xl cursor-pointer">
          <div class="text-5xl mb-6">${t.icon}</div>
          <h3 class="text-xl font-semibold">${t.title}</h3>
        </div>
      `).join('');

      // Sidebar
      const sidebar = document.getElementById('sidebar-tools');
      sidebar.innerHTML = tools.map(t => `
        <div onclick="selectTool('${t.title}')" class="p-3 hover:bg-zinc-800 rounded-xl cursor-pointer flex items-center gap-3">
          <span>${t.icon}</span> <span>${t.title}</span>
        </div>
      `).join('');
    }

    function selectTool(title) {
      if (!isUnlocked) {
        showPaywall();
        return;
      }
      currentTool = tools.find(t => t.title === title);
      document.getElementById('modal-title').textContent = title;
      renderFormFields();
      document.getElementById('tool-modal').classList.remove('hidden');
    }

    function renderFormFields() {
      const container = document.getElementById('form-fields');
      container.innerHTML = currentTool.fields.map(field => `
        <div>
          <label class="block text-sm text-zinc-400 mb-1">${field}</label>
          <input type="text" id="field-${field.replace(/\s+/g, '')}" 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3" placeholder="Enter ${field.toLowerCase()}...">
        </div>
      `).join('');
    }

    function submitToolForm() {
      let prompt = currentTool.basePrompt || `Create a ${currentTool.title.toLowerCase()}. Here are the details:\n\n`;

      currentTool.fields.forEach(field => {
        const value = document.getElementById(`field-${field.replace(/\s+/g, '')}`).value || "Not provided";
        prompt += `${field}: ${value}\n`;
      });

      closeToolModal();
      openChat();
      setTimeout(() => {
        document.getElementById('user-input').value = prompt;
      }, 300);
    }

    function closeToolModal() {
      document.getElementById('tool-modal').classList.add('hidden');
    }

    function openChat() {
      if (!isUnlocked) return showPaywall();
      document.getElementById('chat-modal').classList.remove('hidden');
    }

    function closeChat() {
      document.getElementById('chat-modal').classList.add('hidden');
    }

    function checkPassword() {
      const input = document.getElementById('password-input').value.trim();
      if (correctPasswords.includes(input)) {
        isUnlocked = true;
        document.getElementById('paywall').classList.add('hidden');
        document.getElementById('main-app').classList.remove('locked');
      } else {
        alert("Incorrect password.");
      }
    }

    function showPaywall() {
      if (!isUnlocked) document.getElementById('paywall').classList.remove('hidden');
    }

    async function sendMessage() {
      if (!isUnlocked) return;

      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';

      const typingId = addTyping();

      try {
        const res = await fetch('/api/groq', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        removeTyping(typingId);
        addMessage('ai', data.reply);
      } catch(e) {
        removeTyping(typingId);
        addMessage('ai', "Sorry, connection error.");
      }
    }

    function addMessage(role, content) {
      const win = document.getElementById('chat-window');
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
      div.textContent = content;
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
    }

    function addTyping() {
      const id = 'typing-' + Date.now();
      const win = document.getElementById('chat-window');
      const div = document.createElement('div');
      div.id = id;
      div.className = "message ai-message";
      div.textContent = "CosmoAI is thinking...";
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadTools();
      const input = document.getElementById('user-input');
      input.addEventListener('keypress', e => {
        if (e.key === 'Enter') sendMessage();
      });
    });
  </script>
</body>
</html>
