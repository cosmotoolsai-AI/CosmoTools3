<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CosmoTools • AI Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .message { max-width: 80%; padding: 14px 20px; border-radius: 20px; }
    .user-message { background: rgb(124 58 237); margin-left: auto; border-bottom-right-radius: 4px; }
    .ai-message { background: rgb(39 39 42); margin-right: auto; border-bottom-left-radius: 4px; }
    .history-item { transition: all 0.2s; }
    .history-item:hover { background-color: rgb(63 63 70); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 overflow-hidden">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col"></div>

    <!-- Main Area -->
    <div class="flex-1 flex flex-col">
      <!-- Top Header -->
      <header class="h-14 border-b border-zinc-800 bg-zinc-900 px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl">🪐</span>
          <h1 class="text-xl font-semibold">CosmoTools</h1>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="toggleSearch()" 
                  class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm flex items-center gap-2">
            <span>⌘</span> Search
          </button>
          <button onclick="showLoginModal()" 
                  class="px-5 py-1.5 bg-violet-600 hover:bg-violet-500 rounded-xl font-medium">
            Sign in
          </button>
        </div>
      </header>

      <div class="flex flex-1 overflow-hidden">
        <!-- Chat Container -->
        <div class="flex-1 flex flex-col" id="chat-container">
          <!-- Welcome Screen -->
          <div id="welcome" class="flex-1 flex flex-col items-center justify-center p-8 text-center">
            <div class="text-6xl mb-6">🪐</div>
            <h2 class="text-4xl font-bold mb-3">What are we building today?</h2>
            <p class="text-zinc-400 max-w-md">Ask CosmoAI anything. Your conversations are saved automatically.</p>
          </div>

          <!-- Chat Window -->
          <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 hidden bg-zinc-950"></div>

          <!-- Input Area -->
          <div class="p-6 border-t border-zinc-800 bg-zinc-900">
            <div class="max-w-3xl mx-auto">
              <div class="relative">
                <input id="user-input" 
                       type="text"
                       class="w-full bg-zinc-800 border border-zinc-700 focus:border-violet-500 rounded-3xl px-6 py-5 text-lg focus:outline-none"
                       placeholder="Message CosmoAI... (Press Enter)">
                <button onclick="sendMessage()" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 bg-violet-600 hover:bg-violet-500 w-11 h-11 rounded-2xl flex items-center justify-center text-xl">
                  ↑
                </button>
              </div>
              <p class="text-center text-zinc-500 text-xs mt-3">Conversations are saved in your browser</p>
            </div>
          </div>
        </div>

        <!-- Right Panel: Workflows + History -->
        <div class="w-80 border-l border-zinc-800 bg-zinc-900 flex flex-col">
          <!-- Workflows -->
          <div class="p-6 border-b border-zinc-800">
            <h3 class="font-semibold text-violet-400 mb-4">Popular Workflows</h3>
            <div id="workflows-grid" class="space-y-3"></div>
          </div>

          <!-- Conversation History -->
          <div class="flex-1 flex flex-col">
            <div class="p-6 pb-3 flex justify-between items-center border-b border-zinc-800">
              <h3 class="font-semibold">Recent Chats</h3>
              <button onclick="clearHistory()" class="text-xs text-zinc-500 hover:text-red-400">Clear</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-3 space-y-1"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-md p-8">
      <h2 class="text-2xl font-bold mb-6">Sign in to CosmoTools</h2>
      <p class="text-zinc-400 mb-8">Full accounts + cloud sync coming soon.</p>
      <button onclick="fakeLogin()" 
              class="w-full py-4 bg-white text-black rounded-2xl font-semibold mb-3">
        Continue with Google
      </button>
      <button onclick="hideLoginModal()" 
              class="w-full py-3 text-zinc-400 hover:text-white">
        Close
      </button>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from './js/sidebar.js';
    import { loadWorkflows, useWorkflow } from './js/workflows.js';
    import { initSearch } from './js/search.js';

    window.toggleSearch = () => {
      const q = prompt("Search workflows or type your request:");
      if (q) {
        const results = window.filterWorkflows ? window.filterWorkflows(q) : [];
        if (results.length > 0) useWorkflow(results[0].title, results[0].prompt);
        else {
          document.getElementById('user-input').value = q;
          sendMessage();
        }
      }
    };

    window.showLoginModal = () => document.getElementById('login-modal').classList.remove('hidden');
    window.hideLoginModal = () => document.getElementById('login-modal').classList.add('hidden');
    window.fakeLogin = () => {
      alert("✅ Demo login successful! (Full auth coming soon)");
      hideLoginModal();
    };

    // Make functions global
    window.useWorkflow = useWorkflow;

    // Initialize everything
    document.addEventListener('DOMContentLoaded', () => {
      initSidebar();
      loadWorkflows();
      initSearch();
      loadHistory();

      const input = document.getElementById('user-input');
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
    });
  </script>

  <script src="js/utils.js"></script>
<script src="js/workflows.js"></script>
</body>
</html>
